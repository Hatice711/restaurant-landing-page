<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foodie Restaurant</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <h2 class="logo">Foodie</h2>

    <ul class="nav-links">
      <li>Home</li>
      <li>Menu</li>
      <li>About</li>
      <li>Contact</li>
    </ul>

    <button class="btn">Book a Table</button>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-content">
      <h1>Delicious Food, Cozy Atmosphere</h1>
      <p>Fresh ingredients cooked with passion every day.</p>
      <button class="btn">Explore Menu</button>
    </div>
  </section>

  <!-- MENU -->
  <section class="menu">
    <h2>Our Popular Dishes</h2>

    <div class="cards">
      <div class="card">
        <h3>Pizza</h3>
        <p>Cheesy & fresh ingredients</p>
      </div>

      <div class="card">
        <h3>Burger</h3>
        <p>Juicy beef with crispy fries</p>
      </div>

      <div class="card">
        <h3>Pasta</h3>
        <p>Creamy Italian style pasta</p>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 Foodie Restaurant</p>
  </footer>

</body>
</html>
